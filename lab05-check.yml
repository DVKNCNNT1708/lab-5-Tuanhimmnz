name: Lab 05 - Compose Readiness Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Lint docker-compose.yml
        run: docker compose config --quiet

      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running containers
        run: docker compose ps

      - name: Test API /health
        run: curl -fsS http://localhost:8000/health

      - name: Test API /readiness
        run: |
          curl -fsS http://localhost:8000/readiness
          curl -fsS http://localhost:8000/readiness | grep '"status":"ready"'

      - name: Test AI /health
        run: curl -fsS http://localhost:9000/health

      - name: Test DB readiness
        run: docker compose exec -T db pg_isready -U lab05 -d iotdb

      - name: Run Newman collection
        run: npm run test:compose

      - name: Verify readiness checklist
        run: |
          CHECKED=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[xX]\]' checklists/readiness-checklist.md || true)
          echo "Readiness checklist checked items: ${CHECKED:-0}"
          test "${CHECKED:-0}" -ge 6

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          if-no-files-found: warn

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
